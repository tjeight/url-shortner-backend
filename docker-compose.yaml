services:
  postgres:
    image: postgres:latest
    container_name: url-shortner-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: url_shortner_storage
      POSTGRES_DB: url_shortner_db

    ports: 
      - "2001:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
