services:
  postgres:
    image: postgres:latest
    container_name: url-shortner-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: url_shortner_storage
      POSTGRES_DB: url_shortner_db

    ports:
      - "2001:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7.2-alpine
    container_name: url-shortner-redis
    restart: unless-stopped

    ports:
      - "2002:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass url_shortner_cache_storage

volumes:
  postgres_data:
  redis_data:
